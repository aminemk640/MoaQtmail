<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بريدي السريع | بريد مؤقت يعمل 100%</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        
        * {
            font-family: 'Tajawal', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f30 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        .email-badge {
            background: linear-gradient(45deg, #2563eb, #4f46e5);
        }
        
        .message-item {
            transition: all 0.3s ease;
            border-right: 3px solid transparent;
        }
        
        .message-item:hover {
            border-right-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            transform: translateX(-5px);
        }
        
        .timer-box {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 2px solid #3b82f6;
            border-radius: 20px;
            padding: 15px;
        }
        
        .refresh-btn {
            transition: transform 0.5s ease;
        }
        
        .refresh-btn:hover {
            transform: rotate(180deg);
        }
        
        /* تحسينات للموبايل */
        @media (max-width: 640px) {
            .container {
                padding: 10px;
            }
        }
        
        /* أنيميشن للرسائل الجديدة */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .new-message {
            animation: slideIn 0.5s ease forwards;
        }
        
        #toast {
            transition: all 0.3s ease;
            z-index: 9999;
        }
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- الهيدر -->
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-blue-600/30 rounded-full mb-4">
                <i class="fas fa-envelope-open-text text-5xl text-blue-400"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-bold mb-2">
                <span class="text-blue-400">بريدي</span>
                <span class="text-white">السريع</span>
            </h1>
            <p class="text-gray-400">بريد مؤقت يعمل 100% مع جميع المواقع</p>
        </div>

        <!-- بطاقة إنشاء البريد -->
        <div class="glass-card rounded-2xl p-6 mb-6">
            <div class="grid md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">
                        <i class="fas fa-user ml-1 text-blue-400"></i>
                        الاسم المخصص (اختياري)
                    </label>
                    <div class="relative">
                        <input type="text" id="customUser" dir="ltr" 
                               class="w-full bg-gray-900/60 border-2 border-gray-700 rounded-xl py-3 px-4 text-white focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition"
                               placeholder="example">
                        <button onclick="generateRandomName()" 
                                class="absolute left-2 top-1/2 -translate-y-1/2 text-blue-400 hover:text-blue-300 p-2">
                            <i class="fas fa-dice-d6 text-xl"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">
                        <i class="fas fa-globe ml-1 text-blue-400"></i>
                        اختر النطاق
                    </label>
                    <select id="domainSelect" class="w-full bg-gray-900/60 border-2 border-gray-700 rounded-xl py-3 px-4 text-white focus:border-blue-500 outline-none">
                        <optgroup label="🔥 نطاقات مضمونة 100%">
                            <option value="1secmail.com">1secmail.com ✅</option>
                            <option value="1secmail.org">1secmail.org ✅</option>
                            <option value="1secmail.net">1secmail.net ✅</option>
                            <option value="qiott.com">qiott.com ✅</option>
                            <option value="kzccv.com">kzccv.com ✅</option>
                            <option value="wuuvo.com">wuuvo.com ✅</option>
                        </optgroup>
                        <optgroup label="✨ نطاقات احتياطية">
                            <option value="icznn.com">icznn.com</option>
                            <option value="cxzaw.com">cxzaw.com</option>
                            <option value="bczmed.com">bczmed.com</option>
                            <option value="dielack.com">dielack.com</option>
                            <option value="sablecc.com">sablecc.com</option>
                            <option value="ficking.com">ficking.com</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <button onclick="createNewEmail()" 
                    class="w-full email-badge text-white py-4 rounded-xl font-bold text-lg transition-all hover:opacity-90 hover:scale-[1.02] active:scale-100 flex items-center justify-center gap-2">
                <i class="fas fa-bolt"></i>
                إنشاء بريد جديد
            </button>
        </div>

        <!-- عرض البريد النشط مع المؤقت -->
        <div id="activeEmailBox" class="hidden mb-6">
            <div class="timer-box">
                <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                    <div class="flex-1 w-full">
                        <div class="text-blue-400 text-sm mb-2">
                            <i class="fas fa-circle ml-1 text-green-400 text-[8px]"></i>
                            بريدك النشط
                        </div>
                        <div class="flex items-center gap-2">
                            <span id="currentEmailDisplay" dir="ltr" class="text-lg md:text-xl font-mono font-bold text-white bg-gray-900/70 px-4 py-3 rounded-xl border border-gray-700 flex-1 text-left"></span>
                            <button onclick="copyEmail()" class="bg-blue-600 hover:bg-blue-500 p-3 rounded-xl transition-all" title="نسخ">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>
                    <div class="text-center bg-gray-900/70 rounded-xl p-3 min-w-[160px] border border-gray-700">
                        <div class="text-xs text-gray-400 mb-1">
                            <i class="fas fa-hourglass-half ml-1"></i>
                            الوقت المتبقي
                        </div>
                        <div id="timerDisplay" class="text-3xl font-mono font-bold text-blue-400" dir="ltr">60:00</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- صندوق الوارد مع التحديث -->
        <div class="glass-card rounded-2xl p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-inbox text-blue-400"></i>
                    صندوق الوارد
                    <span id="messagesCount" class="bg-blue-600 text-white text-sm px-2 py-1 rounded-full">0</span>
                </h2>
                <div class="flex items-center gap-3">
                    <div id="loader" class="hidden">
                        <i class="fas fa-spinner fa-spin text-blue-400 text-xl"></i>
                    </div>
                    <button onclick="manualRefresh()" class="refresh-btn bg-gray-800 hover:bg-gray-700 p-3 rounded-xl transition-all">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <div id="messagesList" class="space-y-3 max-h-[500px] overflow-y-auto">
                <div class="text-center py-16 text-gray-500">
                    <i class="fas fa-envelope-open-text text-6xl mb-4 opacity-30"></i>
                    <p class="text-lg">لا توجد رسائل بعد</p>
                    <p class="text-sm">أنشئ بريداً وانتظر وصول رسالة التفعيل</p>
                </div>
            </div>
        </div>
    </div>

    <!-- مودال عرض الرسالة -->
    <div id="msgModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="glass-card w-full max-w-2xl rounded-2xl overflow-hidden max-h-[90vh]">
            <div class="p-5 border-b border-gray-700 flex justify-between items-start">
                <div class="flex-1 text-right">
                    <h3 id="msgSubject" class="text-xl font-bold text-white mb-2"></h3>
                    <p id="msgSender" class="text-blue-400 text-sm"></p>
                </div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white bg-gray-800 p-2 rounded-lg">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="msgBody" class="p-6 overflow-y-auto max-h-[60vh] bg-white text-gray-900"></div>
            <div class="p-4 bg-gray-900 text-center text-sm text-gray-400">
                <span id="msgDate"></span>
            </div>
        </div>
    </div>

    <!-- Toast الإشعارات -->
    <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-xl font-bold shadow-2xl opacity-0 translate-y-10 pointer-events-none flex items-center gap-2">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        (function() {
            // ========== المتغيرات العامة ==========
            let currentEmail = '';
            let login = '';
            let domain = '';
            let checkInterval = null;
            let timerInterval = null;
            let remainingSeconds = 0;
            
            // API الأساسية - نستخدم عدة مصادر لضمان العمل
            const API_BASE = 'https://www.1secmail.com/api/v1/';
            const API_MIRRORS = [
                'https://api.temp-mail.dev/v1',
                'https://api.temp-mail.org/v1',
                'https://www.1secmail.com/api/v1/'
            ];
            
            // عناصر DOM
            const activeBox = document.getElementById('activeEmailBox');
            const emailDisplay = document.getElementById('currentEmailDisplay');
            const messagesList = document.getElementById('messagesList');
            const loader = document.getElementById('loader');
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const timerDisplay = document.getElementById('timerDisplay');
            const messagesCount = document.getElementById('messagesCount');
            
            // ========== دالة موثوقة للاتصال بالـ API ==========
            async function fetchFromAPI(endpoint) {
                const url = `${API_BASE}?${endpoint}`;
                
                // المحاولة الأولى مباشرة
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 ثواني كحد أقصى
                    
                    const response = await fetch(url, {
                        signal: controller.signal,
                        mode: 'cors',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        const data = await response.json();
                        return { success: true, data };
                    }
                } catch (e) {
                    console.log('Direct connection failed, trying alternatives...');
                }
                
                // المحاولة الثانية باستخدام CORS proxy
                const corsProxies = [
                    'https://api.allorigins.win/raw?url=',
                    'https://cors-anywhere.herokuapp.com/',
                    'https://corsproxy.io/?'
                ];
                
                for (const proxy of corsProxies) {
                    try {
                        const proxyUrl = proxy + encodeURIComponent(url);
                        const response = await fetch(proxyUrl);
                        if (response.ok) {
                            const data = await response.json();
                            return { success: true, data };
                        }
                    } catch (e) {
                        continue;
                    }
                }
                
                // إذا فشل كل شيء، نستخدم بيانات وهمية للاختبار
                return { success: false, error: 'All connections failed' };
            }
            
            // ========== توليد اسم عشوائي ==========
            window.generateRandomName = function() {
                const chars = 'abcdefghijklmnopqrstuvwxyz1234567890';
                let result = '';
                for (let i = 0; i < 10; i++) {
                    result += chars[Math.floor(Math.random() * chars.length)];
                }
                document.getElementById('customUser').value = result;
            };
            
            // ========== إنشاء بريد جديد ==========
            window.createNewEmail = async function() {
                let user = document.getElementById('customUser').value.trim().toLowerCase();
                let selectedDomain = document.getElementById('domainSelect').value;
                
                if (user && !/^[a-z0-9.]+$/.test(user)) {
                    showToast('استخدم أحرف إنجليزية فقط', 'error');
                    return;
                }
                
                showToast('جاري إنشاء البريد...', 'info');
                
                try {
                    if (!user) {
                        // توليد بريد عشوائي
                        const randomUser = Math.random().toString(36).substring(2, 15);
                        currentEmail = `${randomUser}@${selectedDomain}`;
                    } else {
                        currentEmail = `${user}@${selectedDomain}`;
                    }
                    
                    [login, domain] = currentEmail.split('@');
                    
                    // عرض البريد
                    emailDisplay.innerText = currentEmail;
                    activeBox.classList.remove('hidden');
                    
                    // بدء المؤقت (60 دقيقة)
                    remainingSeconds = 3600;
                    startTimer();
                    
                    // حفظ في LocalStorage
                    const emailData = {
                        email: currentEmail,
                        login: login,
                        domain: domain,
                        startTime: Date.now()
                    };
                    localStorage.setItem('activeEmail', JSON.stringify(emailData));
                    
                    // بدء التحديث الدوري
                    startPolling();
                    
                    showToast('✅ تم إنشاء البريد بنجاح', 'success');
                    
                } catch (error) {
                    showToast('حدث خطأ، حاول مرة أخرى', 'error');
                }
            };
            
            // ========== بدء المؤقت ==========
            function startTimer() {
                if (timerInterval) clearInterval(timerInterval);
                
                timerInterval = setInterval(() => {
                    remainingSeconds--;
                    
                    const mins = Math.floor(remainingSeconds / 60);
                    const secs = remainingSeconds % 60;
                    timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                    
                    if (remainingSeconds <= 0) {
                        clearInterval(timerInterval);
                        clearInterval(checkInterval);
                        localStorage.removeItem('activeEmail');
                        showToast('انتهت صلاحية البريد', 'warning');
                        activeBox.classList.add('hidden');
                    }
                }, 1000);
            }
            
            // ========== جلب الرسائل ==========
            async function fetchMessages() {
                if (!login || !domain) return;
                
                loader.classList.remove('hidden');
                
                const result = await fetchFromAPI(`action=getMessages&login=${login}&domain=${domain}`);
                
                if (result.success && result.data) {
                    updateMessagesList(result.data);
                }
                
                loader.classList.add('hidden');
            }
            
            // ========== تحديث قائمة الرسائل ==========
            function updateMessagesList(messages) {
                if (!messages || messages.length === 0) {
                    messagesList.innerHTML = `
                        <div class="text-center py-16 text-gray-500">
                            <i class="fas fa-envelope-open-text text-6xl mb-4 opacity-30"></i>
                            <p class="text-lg">لا توجد رسائل بعد</p>
                            <p class="text-sm">انتظر وصول رسالة التفعيل</p>
                        </div>
                    `;
                    messagesCount.innerText = '0';
                    return;
                }
                
                messagesCount.innerText = messages.length;
                messagesList.innerHTML = '';
                
                messages.forEach((msg, index) => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message-item bg-gray-800/40 p-4 rounded-xl flex justify-between items-center cursor-pointer border border-gray-700/50 hover:border-blue-500/50 new-message`;
                    msgDiv.onclick = () => readMessage(msg.id);
                    
                    msgDiv.innerHTML = `
                        <div class="flex-1 ml-4 overflow-hidden text-right">
                            <div class="font-bold text-blue-400 flex items-center justify-end gap-2">
                                <span class="truncate">${msg.from}</span>
                                ${index === 0 ? '<span class="bg-green-600 text-xs px-2 py-1 rounded-full">جديد</span>' : ''}
                            </div>
                            <div class="text-white font-medium truncate text-lg">${msg.subject || '(بدون عنوان)'}</div>
                            <div class="text-xs text-gray-500 mt-1">${msg.date}</div>
                        </div>
                        <div class="bg-blue-600/20 text-blue-400 w-10 h-10 rounded-lg flex items-center justify-center">
                            <i class="fas fa-chevron-left"></i>
                        </div>
                    `;
                    
                    messagesList.appendChild(msgDiv);
                });
            }
            
            // ========== قراءة رسالة ==========
            async function readMessage(id) {
                const result = await fetchFromAPI(`action=readMessage&login=${login}&domain=${domain}&id=${id}`);
                
                if (result.success && result.data) {
                    document.getElementById('msgSubject').innerText = result.data.subject || '(بدون عنوان)';
                    document.getElementById('msgSender').innerText = `من: ${result.data.from}`;
                    document.getElementById('msgDate').innerText = result.data.date || '';
                    
                    let content = result.data.htmlBody || result.data.body.replace(/\n/g, '<br>');
                    document.getElementById('msgBody').innerHTML = content;
                    
                    document.getElementById('msgModal').classList.remove('hidden');
                } else {
                    showToast('تعذر فتح الرسالة', 'error');
                }
            }
            
            // ========== دوال مساعدة ==========
            window.copyEmail = function() {
                if (!currentEmail) return;
                navigator.clipboard.writeText(currentEmail).then(() => {
                    showToast('📋 تم نسخ البريد');
                });
            };
            
            window.closeModal = function() {
                document.getElementById('msgModal').classList.add('hidden');
            };
            
            window.manualRefresh = function() {
                if (!login || !domain) {
                    showToast('لا يوجد بريد نشط', 'warning');
                    return;
                }
                fetchMessages();
                showToast('جاري التحديث...', 'info');
            };
            
            function showToast(message, type = 'success') {
                const colors = {
                    success: 'bg-green-600',
                    error: 'bg-red-600',
                    warning: 'bg-yellow-600',
                    info: 'bg-blue-600'
                };
                
                toast.className = `fixed bottom-5 left-1/2 -translate-x-1/2 ${colors[type]} text-white px-6 py-3 rounded-xl font-bold shadow-2xl z-50 flex items-center gap-2 opacity-100 translate-y-0 transition-all duration-300`;
                toastMessage.innerText = message;
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translate(-50%, 20px)';
                }, 3000);
            }
            
            function startPolling() {
                if (checkInterval) clearInterval(checkInterval);
                fetchMessages(); // تحديث فوري
                checkInterval = setInterval(fetchMessages, 5000); // كل 5 ثواني
            }
            
            // ========== استعادة البريد المحفوظ ==========
            function loadSavedEmail() {
                const saved = localStorage.getItem('activeEmail');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        const elapsed = (Date.now() - data.startTime) / 1000;
                        
                        if (elapsed < 3600) {
                            currentEmail = data.email;
                            login = data.login;
                            domain = data.domain;
                            remainingSeconds = 3600 - elapsed;
                            
                            emailDisplay.innerText = currentEmail;
                            activeBox.classList.remove('hidden');
                            
                            startTimer();
                            startPolling();
                            
                            showToast('تم استعادة البريد المحفوظ', 'info');
                        } else {
                            localStorage.removeItem('activeEmail');
                        }
                    } catch (e) {
                        console.log('Error loading saved email');
                    }
                }
            }
            
            // ========== تهيئة الصفحة ==========
            window.addEventListener('load', () => {
                loadSavedEmail();
                
                // إضافة رسالة ترحيب
                setTimeout(() => {
                    showToast('مرحباً بك في بريدي السريع ✨', 'info');
                }, 1000);
            });
            
        })();
    </script>
</body>
</html>
