<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailPRO X | أقوى بريد مؤقت احترافي</title>
    
    <!-- Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .inbox-scroll::-webkit-scrollbar { width: 5px; }
        .inbox-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .msg-item:hover { background: rgba(255,255,255,0.05); transform: translateX(-5px); }
        .animate-pulse-fast { animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-6xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400">
                MailPRO <span class="text-white">X</span>
            </h1>
            <p class="text-slate-400 font-medium">نظام بريد مؤقت فائق السرعة مع نطاقات موثوقة 100%</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Sidebar: Create Account -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 rounded-[2rem] shadow-2xl">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles text-blue-400"></i> إنشاء عنوان جديد
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-2 mr-2">اسم المستخدم</label>
                            <input id="username" type="text" placeholder="مثال: ahmed77" class="w-full bg-slate-800/50 border border-slate-700 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-mono">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-2 mr-2">النطاق المتاح</label>
                            <select id="domainList" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none cursor-pointer font-mono text-indigo-400 font-bold">
                                <option disabled selected>جاري تحميل النطاقات...</option>
                            </select>
                        </div>

                        <button onclick="createNewEmail()" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white font-black py-4 rounded-xl transition-all shadow-lg flex items-center justify-center gap-3">
                            <i class="fa-solid fa-plus-circle"></i> إنشاء الآن
                        </button>
                        
                        <button onclick="generateRandom()" class="w-full bg-slate-700/50 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-3 border border-slate-600">
                            <i class="fa-solid fa-shuffle text-slate-400"></i> توليد عشوائي
                        </button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="glass-card p-6 rounded-[2rem] border-blue-500/20">
                    <div class="flex items-center justify-between text-sm">
                        <span class="text-slate-400">حالة الخادم:</span>
                        <span class="flex items-center gap-2 text-emerald-400"><i class="fa-solid fa-circle text-[8px] animate-pulse"></i> متصل</span>
                    </div>
                </div>
            </div>

            <!-- Main Panel: Inbox -->
            <div class="lg:col-span-8">
                <div class="glass-card h-full rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col">
                    
                    <!-- Top Info Bar -->
                    <div class="p-6 border-b border-slate-700/50 bg-slate-800/30 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="text-center md:text-right">
                            <span class="text-xs font-bold text-slate-500 uppercase tracking-tighter">عنوانك الحالي</span>
                            <div class="flex items-center gap-3 mt-1">
                                <h3 id="displayEmail" class="text-xl md:text-2xl font-black text-white font-mono">لا يوجد بريد نشط</h3>
                                <button onclick="copyEmail()" class="text-indigo-400 hover:text-white transition-colors p-2 bg-indigo-500/10 rounded-lg"><i class="fa-regular fa-copy text-xl"></i></button>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div id="loadingStatus" class="hidden text-xs text-blue-400 font-bold flex items-center gap-2">
                                <i class="fa-solid fa-spinner fa-spin"></i> جاري التحديث...
                            </div>
                            <button onclick="refreshInbox()" class="bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 px-5 py-2.5 rounded-full font-bold text-sm transition-all flex items-center gap-2">
                                <i class="fa-solid fa-rotate-right" id="refreshIcon"></i> تحديث يدوي
                            </button>
                        </div>
                    </div>

                    <!-- Messages List -->
                    <div id="inbox" class="flex-1 inbox-scroll overflow-y-auto p-6 space-y-4 min-h-[400px]">
                        <!-- Welcome State -->
                        <div class="h-full flex flex-col items-center justify-center text-center py-20 opacity-30">
                            <i class="fa-solid fa-inbox text-8xl mb-6"></i>
                            <h3 class="text-2xl font-black">صندوق الوارد فارغ</h3>
                            <p class="max-w-xs">بانتظار وصول رسائل جديدة إلى بريدك المؤقت...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Message Modal -->
    <div id="modal" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-md hidden p-4 overflow-y-auto">
        <div class="min-h-screen flex items-center justify-center">
            <div class="bg-slate-900 w-full max-w-4xl rounded-[2.5rem] border border-slate-700 shadow-2xl overflow-hidden flex flex-col">
                <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                    <h2 id="modalSubject" class="text-xl font-black text-white truncate max-w-2xl">الموضوع</h2>
                    <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-slate-700 hover:bg-rose-600 transition-colors flex items-center justify-center text-xl">&times;</button>
                </div>
                <div class="p-4 bg-slate-800/20 border-b border-slate-800 flex flex-wrap gap-4 text-sm text-slate-400">
                    <span><i class="fa-solid fa-user-circle mr-1"></i> <b id="modalFrom">المرسل</b></span>
                    <span><i class="fa-solid fa-calendar-alt mr-1"></i> <b id="modalDate">التاريخ</b></span>
                </div>
                <div id="modalBody" class="p-8 bg-white text-slate-900 overflow-x-auto min-h-[300px] prose prose-slate max-w-none">
                    <!-- HTML Content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://api.mail.tm';
        let account = null;
        let lastMsgCount = 0;
        let isRefreshing = false;

        // 1. جلب النطاقات المتوفرة
        async function fetchDomains() {
            try {
                const res = await fetch(`${API}/domains`);
                const data = await res.json();
                const select = document.getElementById('domainList');
                select.innerHTML = '';
                data['hydra:member'].forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.domain;
                    opt.textContent = `@${d.domain}`;
                    select.appendChild(opt);
                });
            } catch (e) {
                Swal.fire('خطأ', 'فشل الاتصال بالخادم الرئيسي', 'error');
            }
        }

        // 2. إنشاء بريد جديد
        async function createNewEmail() {
            const user = document.getElementById('username').value.trim();
            const domain = document.getElementById('domainList').value;
            
            if (!user) {
                Swal.fire('تنبيه', 'يرجى كتابة اسم مستخدم أولاً', 'warning');
                return;
            }

            const email = `${user}@${domain}`;
            const password = `P@ss_${Math.random().toString(36).substring(2, 10)}`;

            Swal.fire({ title: 'جاري الإنشاء...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });

            try {
                // إنشاء الحساب
                const createRes = await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password })
                });

                if (!createRes.ok) throw new Error("اسم المستخدم محجوز أو النطاق غير متاح حالياً");

                // الحصول على التوكن
                const tokenRes = await fetch(`${API}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password })
                });
                const tokenData = await tokenRes.json();

                account = { email, token: tokenData.token, password };
                localStorage.setItem('mailprox_session', JSON.stringify(account));
                
                updateUI();
                Swal.fire('تم!', `بريدك الجديد: ${email}`, 'success');
                refreshInbox();
                
            } catch (err) {
                Swal.fire('عذراً', err.message, 'error');
            }
        }

        // 3. تحديث الواجهة
        function updateUI() {
            if (account) {
                document.getElementById('displayEmail').innerText = account.email;
            }
        }

        // 4. فحص الرسائل
        async function refreshInbox() {
            if (!account || isRefreshing) return;
            isRefreshing = true;
            document.getElementById('loadingStatus').classList.remove('hidden');
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('fa-spin');

            try {
                const res = await fetch(`${API}/messages`, {
                    headers: { 'Authorization': `Bearer ${account.token}` }
                });
                const data = await res.json();
                const messages = data['hydra:member'];

                if (messages.length > lastMsgCount) {
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play().catch(()=>{});
                }
                lastMsgCount = messages.length;
                renderMessages(messages);
            } catch (e) {
                console.error("Refresh failed");
            } finally {
                isRefreshing = false;
                document.getElementById('loadingStatus').classList.add('hidden');
                icon.classList.remove('fa-spin');
            }
        }

        // 5. عرض قائمة الرسائل
        function renderMessages(msgs) {
            const container = document.getElementById('inbox');
            if (msgs.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-center py-20 opacity-30">
                    <i class="fa-solid fa-inbox text-8xl mb-6"></i>
                    <h3 class="text-2xl font-black">صندوق الوارد فارغ</h3>
                    <p class="max-w-xs">لم تصل أي رسائل بعد، التحديث التلقائي يعمل...</p>
                </div>`;
                return;
            }

            container.innerHTML = msgs.map(m => `
                <div onclick="openMessage('${m.id}')" class="msg-item glass-card p-5 rounded-2xl cursor-pointer transition-all border-l-4 border-l-indigo-500 flex justify-between items-center group">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-indigo-400 font-bold text-sm">${m.from.address}</span>
                            ${!m.seen ? '<span class="bg-rose-500 w-2 h-2 rounded-full"></span>' : ''}
                        </div>
                        <h4 class="font-black text-white truncate">${m.subject || '(بدون موضوع)'}</h4>
                        <p class="text-slate-500 text-xs mt-1">${m.intro}</p>
                    </div>
                    <div class="text-right ml-4">
                        <span class="text-slate-500 text-[10px] font-bold">${new Date(m.createdAt).toLocaleTimeString('ar-EG')}</span>
                        <i class="fa-solid fa-chevron-left text-slate-700 group-hover:text-indigo-400 block mt-2 transition-colors"></i>
                    </div>
                </div>
            `).join('');
        }

        // 6. فتح رسالة معينة
        async function openMessage(id) {
            try {
                const res = await fetch(`${API}/messages/${id}`, {
                    headers: { 'Authorization': `Bearer ${account.token}` }
                });
                const msg = await res.json();

                document.getElementById('modalSubject').innerText = msg.subject || '(بدون موضوع)';
                document.getElementById('modalFrom').innerText = msg.from.address;
                document.getElementById('modalDate').innerText = new Date(msg.createdAt).toLocaleString('ar-EG');
                document.getElementById('modalBody').innerHTML = msg.html ? msg.html[0] : `<pre>${msg.text}</pre>`;
                
                document.getElementById('modal').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } catch (e) {
                Swal.fire('خطأ', 'تعذر تحميل محتوى الرسالة', 'error');
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function generateRandom() {
            const r = Math.random().toString(36).substring(2, 8);
            document.getElementById('username').value = `user_${r}`;
            createNewEmail();
        }

        function copyEmail() {
            if (!account) return;
            navigator.clipboard.writeText(account.email);
            Swal.fire({ title: 'تم النسخ!', icon: 'success', timer: 1000, showConfirmButton: false });
        }

        // تشغيل الخدمة
        window.onload = () => {
            fetchDomains();
            const saved = localStorage.getItem('mailprox_session');
            if (saved) {
                account = JSON.parse(saved);
                updateUI();
                refreshInbox();
            }
            // تحديث تلقائي كل 5 ثوانٍ
            setInterval(refreshInbox, 5000);
        };
    </script>
</body>
</html>
