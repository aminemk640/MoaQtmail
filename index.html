<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailPRO X | Premium Multi-Language Temp Mail</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --font-ar: 'Cairo', sans-serif; --font-en: 'Poppins', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; transition: all 0.3s ease; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .inbox-scroll::-webkit-scrollbar { width: 5px; }
        .inbox-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .msg-item:hover { background: rgba(255,255,255,0.05); transform: translateY(-2px); border-left-color: #6366f1; }
        #modalBody a { color: #6366f1 !important; text-decoration: underline !important; font-weight: bold; }
        .notify-badge { animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 overflow-x-hidden">

    <!-- روابط الأصوات -->
    <audio id="soundSuccess" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
    <audio id="soundNewMsg" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="text-center md:text-start">
                <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400">
                    MailPRO <span class="text-white">X</span>
                </h1>
                <p id="tagline" class="text-slate-400 font-medium mt-2">Professional Disposable Email System</p>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-3">
                <div class="bg-slate-800 p-2 rounded-2xl border border-slate-700 flex gap-1">
                    <button onclick="setLanguage('ar')" class="px-4 py-2 rounded-xl hover:bg-slate-700 transition font-bold text-xs md:text-sm">العربية</button>
                    <button onclick="setLanguage('en')" class="px-4 py-2 rounded-xl hover:bg-slate-700 transition font-bold text-xs md:text-sm">English</button>
                    <button onclick="setLanguage('fr')" class="px-4 py-2 rounded-xl hover:bg-slate-700 transition font-bold text-xs md:text-sm">Français</button>
                </div>
                <button id="btnNotify" onclick="requestNotifyPermission()" class="bg-amber-500/10 text-amber-500 p-3 rounded-2xl border border-amber-500/20 hover:bg-amber-500/20 transition">
                    <i class="fa-solid fa-bell"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Sidebar -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 rounded-[2rem] shadow-2xl">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles text-blue-400"></i> 
                        <span data-i18n="create_title">Create New Email</span>
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-2 px-1" data-i18n="label_user">Username</label>
                            <input id="username" type="text" placeholder="e.g. user77" class="w-full bg-slate-800/50 border border-slate-700 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-mono">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-2 px-1" data-i18n="label_domain">Domain</label>
                            <select id="domainList" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none cursor-pointer font-mono text-indigo-400 font-bold">
                                <option disabled selected data-i18n="loading_domains">Loading domains...</option>
                            </select>
                        </div>

                        <button onclick="createNewEmail()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl transition-all shadow-lg flex items-center justify-center gap-3">
                            <i class="fa-solid fa-plus-circle"></i> <span data-i18n="btn_create">Create Now</span>
                        </button>
                        
                        <button onclick="generateRandom()" class="w-full bg-slate-700/50 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-3 border border-slate-600">
                            <i class="fa-solid fa-shuffle text-slate-400"></i> <span data-i18n="btn_random">Random</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Inbox -->
            <div class="lg:col-span-8">
                <div class="glass-card h-full rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col">
                    
                    <div class="p-6 border-b border-slate-700/50 bg-slate-800/30 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="text-center md:text-start">
                            <span class="text-xs font-bold text-slate-500 uppercase tracking-tighter" data-i18n="label_current">Current Address</span>
                            <div class="flex items-center gap-3 mt-1">
                                <h3 id="displayEmail" class="text-xl md:text-2xl font-black text-white font-mono">---</h3>
                                <button onclick="copyEmail()" class="text-indigo-400 hover:text-white transition-colors p-2 bg-indigo-500/10 rounded-lg"><i class="fa-regular fa-copy text-xl"></i></button>
                            </div>
                        </div>
                        <button onclick="refreshInbox()" class="bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 px-6 py-3 rounded-full font-bold text-sm transition-all flex items-center gap-2">
                            <i class="fa-solid fa-rotate-right" id="refreshIcon"></i> <span data-i18n="btn_refresh">Refresh</span>
                        </button>
                    </div>

                    <div id="inbox" class="flex-1 inbox-scroll overflow-y-auto p-6 space-y-4 min-h-[450px]">
                        <!-- Loading or Empty State -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-md hidden p-4 overflow-y-auto">
        <div class="min-h-screen flex items-center justify-center">
            <div class="bg-slate-900 w-full max-w-4xl rounded-[2.5rem] border border-slate-700 shadow-2xl overflow-hidden">
                <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                    <h2 id="modalSubject" class="text-xl font-black text-white truncate px-4">Subject</h2>
                    <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-slate-700 hover:bg-rose-600 transition-colors flex items-center justify-center text-xl">&times;</button>
                </div>
                <div id="modalBody" class="p-8 bg-white text-slate-900 overflow-x-auto min-h-[400px]">
                    <!-- Message Content -->
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 1000;">Copied!</div>

    <script>
        const API = 'https://api.mail.tm';
        let account = null;
        let currentLang = 'en';
        let lastMsgCount = 0;

        const i18n = {
            ar: {
                tagline: "نظام بريد مؤقت فائق السرعة",
                create_title: "إنشاء عنوان جديد",
                label_user: "اسم المستخدم", label_domain: "النطاق المتاح",
                loading_domains: "جاري تحميل النطاقات...", btn_create: "إنشاء الآن",
                btn_random: "توليد عشوائي", label_current: "عنوانك الحالي",
                btn_refresh: "تحديث", empty_title: "صندوق الوارد فارغ",
                swal_success: "تم النسخ!", new_msg_alert: "رسالة جديدة وصلت!",
                dir: "rtl", font: "var(--font-ar)"
            },
            en: {
                tagline: "Fast & Secure Disposable Email System",
                create_title: "Create New Account",
                label_user: "Username", label_domain: "Available Domain",
                loading_domains: "Loading domains...", btn_create: "Create Now",
                btn_random: "Generate Random", label_current: "Your Current Email",
                btn_refresh: "Refresh", empty_title: "Inbox is Empty",
                swal_success: "Copied!", new_msg_alert: "New message arrived!",
                dir: "ltr", font: "var(--font-en)"
            },
            fr: {
                tagline: "Système de messagerie jetable rapide",
                create_title: "Créer une adresse",
                label_user: "Nom d'utilisateur", label_domain: "Domaine disponible",
                loading_domains: "Chargement...", btn_create: "Créer maintenant",
                btn_random: "Aléatoire", label_current: "Votre adresse actuelle",
                btn_refresh: "Actualiser", empty_title: "Boîte vide",
                swal_success: "Copié!", new_msg_alert: "Nouveau message!",
                dir: "ltr", font: "var(--font-en)"
            }
        };

        // --- وظائف الصوت والإشعارات ---
        function playSound(type) {
            const sound = document.getElementById(type === 'success' ? 'soundSuccess' : 'soundNewMsg');
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Audio blocked by browser"));
        }

        function requestNotifyPermission() {
            if (!("Notification" in window)) return;
            Notification.requestPermission().then(permission => {
                if(permission === 'granted') {
                    document.getElementById('btnNotify').classList.replace('text-amber-500', 'text-emerald-500');
                    new Notification("MailPRO X", { body: "Notifications Enabled!" });
                }
            });
        }

        function sendSystemNotification(title, body) {
            if (Notification.permission === "granted") {
                new Notification(title, { body: body, icon: 'https://cdn-icons-png.flaticon.com/512/281/281769.png' });
            }
        }

        // --- الوظائف الأساسية ---
        function setLanguage(lang) {
            currentLang = lang;
            const data = i18n[lang];
            document.documentElement.lang = lang;
            document.body.style.direction = data.dir;
            document.body.style.fontFamily = data.font;
            document.getElementById('tagline').innerText = data.tagline;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = data[key];
            });
            localStorage.setItem('mailpro_lang', lang);
        }

        async function fetchDomains() {
            try {
                const res = await fetch(`${API}/domains`);
                const data = await res.json();
                const select = document.getElementById('domainList');
                select.innerHTML = '';
                data['hydra:member'].forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.domain; opt.textContent = `@${d.domain}`;
                    select.appendChild(opt);
                });
            } catch (e) { console.error("Domain fetch failed"); }
        }

        async function createNewEmail() {
            const user = document.getElementById('username').value.trim();
            const domain = document.getElementById('domainList').value;
            if (!user) return;

            const email = `${user}@${domain}`;
            const password = `P@ss_${Math.random().toString(36).substring(2, 10)}`;

            Swal.fire({ title: '...', didOpen: () => Swal.showLoading() });

            try {
                const createRes = await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password })
                });

                const tokenRes = await fetch(`${API}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password })
                });
                const tokenData = await tokenRes.json();

                account = { email, token: tokenData.token, password };
                localStorage.setItem('mailpro_session', JSON.stringify(account));
                
                document.getElementById('displayEmail').innerText = email;
                lastMsgCount = 0; // تصفير العداد للبريد الجديد
                playSound('success');
                Swal.close();
                refreshInbox();
            } catch (err) { Swal.fire('Error', err.message, 'error'); }
        }

        async function refreshInbox() {
            if (!account) return;
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('fa-spin');

            try {
                const res = await fetch(`${API}/messages`, {
                    headers: { 'Authorization': `Bearer ${account.token}` }
                });
                const data = await res.json();
                const messages = data['hydra:member'];

                // التحقق من وجود رسائل جديدة
                if (messages.length > lastMsgCount) {
                    const newMsg = messages[0];
                    playSound('newMsg');
                    sendSystemNotification(i18n[currentLang].new_msg_alert, `${newMsg.from.address}: ${newMsg.subject}`);
                }
                
                lastMsgCount = messages.length;
                renderMessages(messages);
            } finally { icon.classList.remove('fa-spin'); }
        }

        function renderMessages(msgs) {
            const container = document.getElementById('inbox');
            if (msgs.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-center py-20 opacity-30">
                    <i class="fa-solid fa-inbox text-8xl mb-6"></i>
                    <h3 class="text-2xl font-black">${i18n[currentLang].empty_title}</h3>
                </div>`;
                return;
            }

            container.innerHTML = msgs.map(m => `
                <div onclick="openMessage('${m.id}')" class="msg-item glass-card p-5 rounded-2xl cursor-pointer transition-all border-l-4 border-l-transparent flex justify-between items-center group">
                    <div class="flex-1 min-w-0 px-2">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-indigo-400 font-bold text-sm truncate">${m.from.address}</span>
                            ${!m.seen ? '<span class="bg-rose-500 w-2 h-2 rounded-full notify-badge"></span>' : ''}
                        </div>
                        <h4 class="font-black text-white truncate">${m.subject || '(No Subject)'}</h4>
                    </div>
                    <span class="text-slate-500 text-[10px] font-bold">${new Date(m.createdAt).toLocaleTimeString()}</span>
                </div>
            `).join('');
        }

        async function openMessage(id) {
            try {
                const res = await fetch(`${API}/messages/${id}`, {
                    headers: { 'Authorization': `Bearer ${account.token}` }
                });
                const msg = await res.json();
                document.getElementById('modalSubject').innerText = msg.subject || '(No Subject)';
                
                let content = msg.html ? msg.html[0] : `<pre>${msg.text}</pre>`;
                const parser = new DOMParser();
                const doc = parser.parseFromString(content, 'text/html');
                doc.querySelectorAll('a').forEach(link => link.setAttribute('target', '_blank'));

                document.getElementById('modalBody').innerHTML = doc.body.innerHTML;
                document.getElementById('modal').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } catch (e) { console.error(e); }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function generateRandom() {
            const r = Math.random().toString(36).substring(2, 8);
            document.getElementById('username').value = `user_${r}`;
            createNewEmail();
        }

        function copyEmail() {
            if (!account) return;
            navigator.clipboard.writeText(account.email);
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1500);
        }

        window.onload = () => {
            const savedLang = localStorage.getItem('mailpro_lang') || (['ar', 'en', 'fr'].includes(navigator.language.split('-')[0]) ? navigator.language.split('-')[0] : 'en');
            setLanguage(savedLang);
            fetchDomains();
            const saved = localStorage.getItem('mailpro_session');
            if (saved) {
                account = JSON.parse(saved);
                document.getElementById('displayEmail').innerText = account.email;
                refreshInbox();
            }
            setInterval(refreshInbox, 10000);
        };
    </script>
</body>
</html>
